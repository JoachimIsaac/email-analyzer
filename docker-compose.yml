services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-emailanalyzer}
      POSTGRES_USER: ${POSTGRES_USER:-emailanalyzer}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-emailanalyzer}
      POSTGRES_INITDB_ARGS: "--auth-host=md5 --auth-local=md5"
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-emailanalyzer} -d ${POSTGRES_DB:-emailanalyzer}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
